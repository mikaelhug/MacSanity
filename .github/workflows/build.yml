name: Build

# Build (and publish) a release whenever a version tag like v1.2.3 is pushed.
# Tags aren't tied to a branch, so push the tag on the commit you want released
# (i.e. the tip of main): `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Run classifier checks
        run: swift run ClassifierCheck

      # Import the stable signing cert (if the secrets are set) so released builds
      # carry the same identity as local ones — that's what lets the Accessibility
      # grant survive auto-updates. Without the secrets, the build is ad-hoc signed.
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.MACSANITY_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACSANITY_CERT_PASSWORD }}
        run: |
          if [ -z "${CERT_P12:-}" ]; then
            echo "No MACSANITY_CERT_P12 secret — release will be ad-hoc signed."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "MACSANITY_SIGN_IDENTITY=MacSanity Self-Signed" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: ./Scripts/build-app.sh release
        env:
          MACSANITY_VERSION: ${{ github.ref_name }}

      - name: Package
        run: ditto -c -k --keepParent build/MacSanity.app "build/MacSanity-${GITHUB_REF_NAME}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: MacSanity-${{ github.ref_name }}
          path: build/MacSanity-*.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/MacSanity-*.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
